            let temp = []   
            for (let i = 0; i<arr.length-1; i++) {
                for (let k = 0; k<(arr.length-i)-1; k++) {
                    if (arr[k] > arr[k+1]) {
                        temp = arr[k]
                        arr[k] = arr[k+1]
                        arr[k+1] = temp
                    }
                }

            }
        }

        insertionSort(arr){
            let key,k
            for(let i = 1; i<arr.length;i++){
                key = arr[i]
                k = i-1
                while(k>=0 && key<arr[k]){
                    arr[k+1] = arr[k]
                    k = k-1
                }
                arr[k+1] = key
            }
        }
